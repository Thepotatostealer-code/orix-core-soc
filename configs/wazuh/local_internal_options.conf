# Wazuh Agent — local internal options
# See /docs/05-troubleshooting-log.md "Command-Based Monitoring Producing No Data"
#
# CRITICAL: without this line, every <command> block in ossec.conf's <localfile>
# sections is silently ignored (no error, no log entry — it just never runs).
# This single line was the highest-impact fix in the entire hardening process.

logcollector.remote_commands=1
